services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: slideforge
      POSTGRES_PASSWORD: slideforge
      POSTGRES_DB: slideforge
    ports:
      - '5432:5432'
    volumes:
      - slideforge_pg:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U slideforge']
      interval: 5s
      timeout: 5s
      retries: 5

  # Optional — host port 6380 avoids conflict with system Redis on 6379.
  # Skip this if you already have Redis; keep REDIS_URL=redis://localhost:6379
  redis:
    image: redis:7-alpine
    ports:
      - '6380:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - slideforge_minio:/data
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    
    # --- Application Services Added Below ---
  
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "3001:3000"
    environment:
      - DATABASE_URL=postgres://slideforge:slideforge@postgres:5432/slideforge
      - REDIS_URL=redis://redis:6379
      - PORT=3000
    depends_on:
      - postgres
      - redis

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    environment:
      - DATABASE_URL=postgres://slideforge:slideforge@postgres:5432/slideforge
      - REDIS_URL=redis://redis:6379
    depends_on:
      - postgres
      - redis
      - api

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    ports:
      - "3002:3000"  # <-- Host 3002 maps to Container 3000
    environment:
      - INTERNAL_API_URL=http://api:3000 
      - NEXT_PUBLIC_API_URL=http://localhost:3001 
    depends_on:
      - api
  

volumes:
  slideforge_pg:
  slideforge_minio:
