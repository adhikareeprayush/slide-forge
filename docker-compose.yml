services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: slideforge
      POSTGRES_PASSWORD: slideforge
      POSTGRES_DB: slideforge
    ports:
      - '5432:5432'
    volumes:
      - slideforge_pg:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U slideforge']
      interval: 5s
      timeout: 5s
      retries: 5

  # Optional — host port 6380 avoids conflict with system Redis on 6379.
  # Skip this if you already have Redis; keep REDIS_URL=redis://localhost:6379
  redis:
    image: redis:7-alpine
    ports:
      - '6380:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - slideforge_minio:/data
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  slideforge_pg:
  slideforge_minio:
