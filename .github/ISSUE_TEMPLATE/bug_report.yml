name: Bug report
description: Something is broken or behaves unexpectedly
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting! Please search [existing issues](https://github.com/adhikareeprayush/slide-forge/issues) first.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Clear description of the bug
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to /generate
        2. Enter topic "..."
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Generation (AI / WebSocket)
        - Editor
        - Export (PPTX / PDF / HTML)
        - Layouts / rendering
        - API
        - SDK / CLI
        - Infrastructure / Docker
        - Other
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Commit or version (if known)
      placeholder: main @ abc1234

  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: API terminal output, browser console, or screenshots
