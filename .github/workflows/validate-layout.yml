name: Validate Community Layouts

on:
  pull_request:
    paths:
      - 'community/**'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install

      - name: Build SDK
        run: pnpm --filter @slideforge/schema build && pnpm --filter @slideforge/sdk build

      - name: Validate changed layouts
        run: |
          set -e
          CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD -- 'community/*/slide.config.ts' | xargs -I{} dirname {} | sort -u)
          if [ -z "$CHANGED" ]; then
            echo "No layout configs changed"
            exit 0
          fi
          for dir in $CHANGED; do
            echo "Validating $dir..."
            node packages/sdk/dist/cli.js validate "$dir"
            if [ -f "$dir/thumbnail.svg" ]; then
              grep -q '<svg' "$dir/thumbnail.svg" || (echo "Invalid thumbnail.svg in $dir" && exit 1)
            fi
          done

      - name: Comment on PR
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '### Layout validation\nCI ran `slideforge validate` on changed community layouts. See workflow logs for details.'
            })
